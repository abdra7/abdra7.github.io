    <script>
      // Apply persisted theme BEFORE React mounts to avoid any flash of the wrong theme.
      // Default = dark ("old portfolio look").
      (function () {
        try {
          var t = window.localStorage.getItem('darbak.theme');
          if (t !== 'dark' && t !== 'light') t = 'dark';
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
